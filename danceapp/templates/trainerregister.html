<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Team | Trainer Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --trainer-teal: #0d9488;
            --trainer-indigo: #4338ca;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --error-red: #ffcfcf;
            --valid-green: #22c55e;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, var(--trainer-teal) 0%, var(--trainer-indigo) 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        h2 { text-align: center; color: #fff; font-size: 32px; margin-bottom: 30px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        label { font-weight: 600; color: #fff; display: block; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        /* HTML5 Validation Styles */
        input:focus { outline: none; border-color: #fff; }
        
        /* Visual feedback for valid/invalid states after user interacts */
        input:user-invalid { border-color: #ef4444; }
        input:user-valid { border-color: var(--valid-green); }

        .error-msg {
            color: var(--error-red);
            font-size: 11px;
            font-weight: 600;
            margin-top: 5px;
            display: none;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            background-color: #fff;
            color: var(--trainer-indigo);
            border: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover { background-color: #f0f0f0; transform: translateY(-2px); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trainer Registration</h2>

    <form method="POST" enctype="multipart/form-data" id="regForm">
        {% csrf_token %}

        <div class="form-grid">
            <div class="full-width">
                <label>Full Name</label>
                <input type="text" name="name" required minlength="3" placeholder="Enter your full name" pattern="[A-Za-z\s]+" title="Only letters and spaces allowed">
            </div>

            <div class="full-width">
                <label>Email Address</label>
                <input type="email" name="email" id="email" placeholder="email@example.com" required>
                <small class="error-msg" id="emailError">Please enter a valid email.</small>
            </div>

            <div class="full-width">
                <label>Password</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password" 
                    placeholder="Upper, lower, number & symbol" 
                    required
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}"
                >
                <small class="error-msg" id="passError">
                    Must include: 8+ chars, 1 uppercase, 1 lowercase, 1 number, and 1 symbol.
                </small>
            </div>

            <div>
                <label>Age (18 - 65)</label>
                <input type="number" name="age" id="age" min="18" max="65" placeholder="18-65" required>
                <small class="error-msg" id="ageError">Age must be between 18 and 65.</small>
            </div>

            <div>
                <label>Gender</label>
                <select name="Gender" required>
                    <option value="">Select</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>

            <div>
                <label>Phone Number</label>
                <input type="tel" name="phone" id="phone" pattern="[0-9]{10}" placeholder="10 digit number" required>
                <small class="error-msg" id="phoneError">Please enter exactly 10 digits.</small>
            </div>

            <div>
                <label>Experience (Years)</label>
                <input type="number" name="experiance" min="0" max="50" placeholder="Years">
            </div>

            <div class="full-width">
                <label>Expertise Category</label>
                <select name="category" required>
                    <option value="">Choose a Course...</option>
                    {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.course_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Profile Image</label>
                <input type="file" name="image" accept="image/*" required>
            </div>

            <div>
                <label>Certificate</label>
                <input type="file" name="certificate" accept=".pdf,.jpg,.jpeg" required>
            </div>
        </div>

        <button type="submit">Submit Application</button>
    </form>
</div>

<script>
    const form = document.getElementById('regForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const age = document.getElementById('age');
    const phone = document.getElementById('phone');

    // Real-time helper function
    const validate = (input, errorId, condition) => {
        const error = document.getElementById(errorId);
        if (condition) {
            error.style.display = 'none';
            input.style.borderColor = 'var(--valid-green)';
            return true;
        } else if (input.value !== "") {
            error.style.display = 'block';
            input.style.borderColor = '#ef4444';
            return false;
        }
        return false;
    };

    // Validation Listeners
    email.addEventListener('input', () => 
        validate(email, 'emailError', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)));

    password.addEventListener('input', () => {
        // Regex: 1 Upper, 1 Lower, 1 Number, 1 Symbol, Min 8 Chars
        const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
        validate(password, 'passError', strongRegex.test(password.value));
    });

    age.addEventListener('input', () => 
        validate(age, 'ageError', age.value >= 18 && age.value <= 65));

    phone.addEventListener('input', () => 
        validate(phone, 'phoneError', /^\d{10}$/.test(phone.value)));

    // Prevent submission if invalid
    form.addEventListener('submit', (e) => {
        const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
        
        // Final check for all custom conditions
        const isEmailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
        const isPasswordValid = strongRegex.test(password.value);
        const isAgeValid = age.value >= 18 && age.value <= 65;
        const isPhoneValid = /^\d{10}$/.test(phone.value);

        if (!form.checkValidity() || !isEmailValid || !isPasswordValid || !isAgeValid || !isPhoneValid) {
            e.preventDefault();
            alert("Please ensure all fields are correct and meet the security requirements.");
        }
    });
</script>
</body>
</html>
