{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist | Add Makeup Reference</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>
        body {
            background: #f4f6f9;
        }

        .form-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: bold;
        }

        label {
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">💃 Artist Panel</span>
    <a href="/artistdashboard/" class="text-white text-decoration-none">Dashboard</a>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="form-card">
                <h4 class="mb-4 text-center">Add Makeup Reference</h4>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Dance Category -->
                    <div class="form-group mb-3">
                        <label>Dance Category</label>
                        <select name="dance_category" class="form-control" required>
                            <option value="">Select Dance Category</option>
                            <option>Bharatanatyam</option>
                            <option>Mohiniyattam</option>
                            <option>Kuchipudi</option>
                        </select>
                    </div>

                    <!-- Makeup Images -->
                    <div class="form-group mb-3">
                        <label>Makeup Reference Images</label>
                        <input type="file" name="makeup_images" class="form-control" multiple required>
                        <small class="text-muted">Upload clear face & costume images</small>
                    </div>

                    <!-- Notes -->
                    <div class="form-group mb-4">
                        <label>Makeup Notes</label>
                        <textarea name="notes" class="form-control" rows="4"
                                  placeholder="Eye makeup, colors, ornaments, stage look..."></textarea>
                    </div>

                    <!-- Submit -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-success px-5">
                            Upload Reference
                        </button>
                    </div>
                </form>

            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="{% static 'js/bootstrap.min.js' %}"></script>

</body>
</html>
