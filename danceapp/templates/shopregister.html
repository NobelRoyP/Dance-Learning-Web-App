<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Registration</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f3f3f3;
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: white;
            width: 400px;
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #444;
            font-size: 26px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #444;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #ff6fa8;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #ff6fa8;
            color: white;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #ff3d87;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #ff6fa8;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Shop Registration</h2>

    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="input-group">
            <label>Shop Name</label>
            <input type="text" name="sname" placeholder="Enter shop name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter phone number" required>
        </div>

        <div class="input-group">
            <label>Shop Logo</label>
            <input type="file" name="shop_logo" accept="image/*">
        </div>

       <div class="input-group">
            <label>location</label>
            <input type="textfield" name="location" placeholder="Enter location" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit">Register</button>

        <div class="login-link">
            Already have an account? <a href="#">Login</a>
        </div>

    </form>
</div>

</body>
</html>
