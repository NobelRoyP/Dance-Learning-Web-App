<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --admin-dark: #0f172a;
            --admin-blue: #2563eb;
            --glass-white: rgba(255, 255, 255, 0.1);
            --border-white: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Deeper, more "Admin" professional gradient */
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            overflow: hidden;
        }

        /* Ambient background glow for a premium feel */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--admin-blue);
            filter: blur(150px);
            top: 10%;
            left: 10%;
            opacity: 0.2;
            z-index: -1;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: var(--glass-white);
            padding: 45px 35px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-white);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 35px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 24px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-white);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--admin-blue);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }

        input::placeholder {
            color: #64748b;
        }

        .btn {
            width: 100%;
            background: var(--admin-blue);
            color: #fff;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .btn:hover {
            background: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Subtle footer decoration */
        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2 class="login-title">Admin Portal</h2>
        <p class="subtitle">Secure access for administrators</p>

        <form action="" method="POST">
            {% csrf_token %}

            <label>Admin Email</label>
            <input type="email" name="email" placeholder="admin@system.com" required>

            <label>Access Password</label>
            <input type="password" name="psw" placeholder="••••••••" required>

            <button class="btn" type="submit">Authenticate</button>
        </form>

        <div class="footer-text">
            &copy; 2026 Dance App | Internal Use Only
        </div>
    </div>

</body>
</html>
