<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary-teal: #0d9488;
            --primary-indigo: #4338ca;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary-teal) 0%, var(--primary-indigo) 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            background: var(--glass);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary-teal);
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background: linear-gradient(to right, var(--primary-teal), var(--primary-indigo));
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(67, 56, 202, 0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
        }

        .footer-text a {
            color: var(--primary-indigo);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Error state styling */
        input:invalid:not(:placeholder-shown) {
            border-color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Institution Login</h2>
        <p class="subtitle">Welcome back! Please enter your details.</p>

        <form method="POST" action="">
            {% csrf_token %}

            <div class="input-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    name="email"
                    placeholder="name@institution.com"
                    required
                >
            </div>

            <div class="input-group">
                <label>Password</label>
                <input 
                    type="password" 
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit">Sign In</button>

            <p class="footer-text">
                Don't have an account? 
                <a href="/institutionregister/">Register Now</a>
            </p>
        </form>
    </div>

</body>
</html>
