<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trainer Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --trainer-primary: #0d9488; /* Teal */
            --trainer-hover: #0f766e;
            --glass-white: rgba(255, 255, 255, 0.2);
            --text-dark: #134e4a;
        }

        body {
            font-family: "Poppins", sans-serif;
            /* Energetic Teal to Indigo gradient */
            background: linear-gradient(135deg, #0d9488 0%, #4338ca 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: var(--glass-white);
            padding: 45px 35px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
            margin: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            text-align: center;
            font-size: 30px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            color: #fff;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            transition: 0.3s ease;
            margin-bottom: 20px;
            color: #333;
        }

        input:focus {
            border-color: #fff;
            background: #fff;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background-color: var(--trainer-primary);
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px rgba(13, 148, 136, 0.3);
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--trainer-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(13, 148, 136, 0.4);
        }

        p {
            text-align: center;
            margin-top: 25px;
            color: #fff;
            font-size: 14px;
        }

        a {
            color: #ccfbf1; /* Light teal link */
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        a:hover {
            border-bottom: 2px solid #ccfbf1;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Trainer Login</h2>
        <p class="subtitle">Access your classes and students</p>

        <form method="POST" action="">
            {% csrf_token %}

            <label>Professional Email</label>
            <input 
                type="email" 
                name="email"
                placeholder="trainer@institution.com"
                required
            >

            <label>Password</label>
            <input 
                type="password" 
                name="password"
                placeholder="••••••••"
                required
            >

            <button type="submit">Enter Portal</button>

            <p>
                New instructor? 
                <a href="/trainerregister">Join our team</a>
            </p>
        </form>
    </div>

</body>
</html>
