{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Nrityangana</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #0c0a07;
            --card:        #1a1610;
            --card-2:      #201c12;
            --border:      #302820;
            --border-hi:   rgba(201,168,76,.4);
            --border-focus:#c9a84c;
            --gold:        #c9a84c;
            --gold-dim:    #8a6f2e;
            --gold-light:  rgba(201,168,76,.1);
            --cream:       #f0e6ce;
            --muted:       #7a6e5a;
            --red:         #c05a5a;
            --star-off:    #2e2518;
            --star-on:     #e8b84a;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--cream);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            background-image:
                radial-gradient(ellipse 70% 45% at 15% 0%, rgba(42,26,8,.55) 0%, transparent 55%),
                radial-gradient(ellipse 50% 35% at 85% 100%, rgba(48,14,14,.3) 0%, transparent 55%);
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(12,10,7,.92); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            height: 62px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 28px;
        }
        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem; font-weight: 700;
            color: var(--gold); text-decoration: none; letter-spacing: .04em;
        }
        .nav-brand span { color: var(--cream); }
        .nav-back {
            display: flex; align-items: center; gap: 7px;
            color: var(--muted); font-size: .86rem; text-decoration: none;
            padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
            transition: color .18s, border-color .18s, background .18s;
        }
        .nav-back:hover { color: var(--cream); border-color: var(--border-hi); background: var(--gold-light); }
        .nav-back svg { width: 14px; height: 14px; }

        /* PAGE */
        .page {
            max-width: 560px; margin: 0 auto;
            padding: 52px 20px 80px;
            display: flex; flex-direction: column; align-items: stretch;
        }

        /* Eyebrow */
        .eyebrow {
            display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
        }
        .eyebrow span {
            font-size: .62rem; font-weight: 600; letter-spacing: .2em;
            text-transform: uppercase; color: var(--muted); white-space: nowrap;
        }
        .eyebrow-line { flex: 1; height: 1px; background: var(--border); }

        /* FORM CARD */
        .form-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,.4);
            animation: rise .45s ease both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Banner */
        .banner {
            height: 72px;
            background: linear-gradient(135deg, #150e04 0%, #3a2008 50%, #5a3410 100%);
            position: relative; overflow: hidden;
        }
        .banner::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #4a3000, var(--gold), #e8c060, var(--gold), #4a3000);
            background-size: 200% 100%;
            animation: shimmer 5s linear infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .banner::after {
            content: '';
            position: absolute; right: -40px; bottom: -40px;
            width: 140px; height: 140px; border-radius: 50%;
            border: 1px solid rgba(201,168,76,.1);
        }

        /* Card head */
        .card-head {
            padding: 20px 26px 0;
            display: flex; align-items: center; gap: 14px;
        }
        .head-icon {
            width: 44px; height: 44px; border-radius: 11px;
            background: var(--gold-light); border: 1px solid rgba(201,168,76,.22);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .head-title { font-size: 1.05rem; font-weight: 700; color: var(--cream); letter-spacing: -.02em; }
        .head-sub { font-size: .72rem; color: var(--muted); margin-top: 2px; }
        .card-rule { height: 1px; background: var(--border); margin: 18px 26px 0; }

        /* FORM */
        form { padding: 22px 26px 26px; }

        .field-group { margin-bottom: 22px; }
        .field-group:last-of-type { margin-bottom: 0; }

        label.field-label {
            display: block; font-size: .67rem; font-weight: 700;
            letter-spacing: .12em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 12px;
        }

        /* ── STAR RATING ── */
        .star-wrap {
            display: flex; flex-direction: row-reverse;
            justify-content: flex-end; gap: 4px;
        }
        .star-wrap input[type="radio"] { display: none; }
        .star-wrap label {
            font-size: 2.4rem; line-height: 1;
            color: var(--star-off);
            cursor: pointer; padding: 0 3px;
            transition: color .15s, transform .15s;
            display: block; letter-spacing: 0;
            text-transform: none; font-weight: 400;
        }
        /* highlight on hover and forward stars */
        .star-wrap label:hover,
        .star-wrap label:hover ~ label,
        .star-wrap input:checked ~ label {
            color: var(--star-on);
            transform: scale(1.15);
        }

        /* Star label text */
        .star-hint {
            font-size: .72rem; color: var(--muted); margin-top: 10px;
            font-style: italic; min-height: 1em;
            transition: opacity .2s;
        }

        /* Textarea */
        textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--card-2);
            border: 1px solid var(--border); border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: .88rem; font-weight: 400;
            color: var(--cream); outline: none;
            transition: border-color .18s, box-shadow .18s;
            resize: vertical; min-height: 110px; line-height: 1.6;
        }
        textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(201,168,76,.1);
            background: #241e14;
        }
        textarea::placeholder { color: var(--muted); font-weight: 300; }

        /* Submit */
        .btn-submit {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--gold-dim), var(--gold));
            color: #0c0a07;
            font-family: 'DM Sans', sans-serif;
            font-size: .82rem; font-weight: 700;
            letter-spacing: .06em; text-transform: uppercase;
            border-radius: 11px; border: none; cursor: pointer;
            box-shadow: 0 4px 14px rgba(201,168,76,.24);
            transition: opacity .18s, transform .15s, box-shadow .18s;
            margin-top: 22px;
        }
        .btn-submit:hover {
            opacity: .88; transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(201,168,76,.32);
        }
        .btn-submit svg { width: 14px; height: 14px; }

        @media (max-width: 520px) {
            nav { padding: 0 16px; }
            .page { padding: 32px 14px 60px; }
            form { padding: 18px 18px 22px; }
            .card-head { padding: 18px 18px 0; }
            .card-rule { margin: 16px 18px 0; }
            .star-wrap label { font-size: 2rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/userhome/" class="nav-brand">🪷 Nritya<span>ngana</span></a>
    <a href="/userhome/" class="nav-back">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Home
    </a>
</nav>

<div class="page">

    <div class="eyebrow">
        <span>Student Portal</span>
        <div class="eyebrow-line"></div>
    </div>

    <div class="form-card">
        <div class="banner"></div>

        <div class="card-head">
            <div class="head-icon">⭐</div>
            <div>
                <div class="head-title">Share Your Feedback</div>
                <div class="head-sub">Help us improve your experience</div>
            </div>
        </div>
        <div class="card-rule"></div>

        <form method="POST">
            {% csrf_token %}

            <!-- Star rating -->
            <div class="field-group">
                <label class="field-label">Rate Your Experience</label>
                <div class="star-wrap" id="star-wrap">
                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5" title="Excellent">★</label>

                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4" title="Good">★</label>

                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3" title="Okay">★</label>

                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2" title="Poor">★</label>

                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1" title="Terrible">★</label>
                </div>
                <div class="star-hint" id="star-hint">Tap a star to rate</div>
            </div>

            <!-- Comment -->
            <div class="field-group">
                <label class="field-label">Your Comment</label>
                <textarea name="comment" required
                          placeholder="Tell us about your experience — what you loved, what could be better…"
                          rows="4"></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                Send Feedback
            </button>
        </form>
    </div>

</div>

<script>
    const hints = { 1: 'Terrible', 2: 'Poor', 3: 'Okay', 4: 'Good', 5: 'Excellent ✨' };
    const hintEl = document.getElementById('star-hint');
    const radios = document.querySelectorAll('.star-wrap input[type="radio"]');

    radios.forEach(radio => {
        radio.addEventListener('change', () => {
            hintEl.textContent = hints[radio.value] || 'Tap a star to rate';
            hintEl.style.color = radio.value >= 4 ? 'var(--star-on)' : 'var(--muted)';
        });
    });

    // Hover hints
    document.querySelectorAll('.star-wrap label').forEach(lbl => {
        lbl.addEventListener('mouseenter', () => {
            const val = lbl.getAttribute('for').replace('star', '');
            hintEl.textContent = hints[val] || '';
        });
        lbl.addEventListener('mouseleave', () => {
            const checked = document.querySelector('.star-wrap input:checked');
            hintEl.textContent = checked ? hints[checked.value] : 'Tap a star to rate';
            hintEl.style.color = checked && checked.value >= 4 ? 'var(--star-on)' : 'var(--muted)';
        });
    });
</script>

</body>
</html>
