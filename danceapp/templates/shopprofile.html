<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Profile</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: #eef1f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            width: 380px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-card img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4e73df;
            margin-bottom: 20px;
        }

        .profile-card h2 {
            margin: 10px 0;
            font-size: 24px;
            color: #333;
        }

        .info-box {
            margin-top: 20px;
            text-align: left;
        }

        .info-box p {
            background: #f7f9fc;
            padding: 12px;
            border-radius: 12px;
            margin: 8px 0;
            border-left: 4px solid #4e73df;
            font-size: 15px;
        }

        .edit-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4e73df;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
        }

        .edit-btn:hover {
            background: #2e59d9;
        }
    </style>

</head>
<body>

<div class="profile-card">

    {% if shop.shop_logo %}
    <img src="{{ shop.shop_logo.url }}" alt="Shop Logo">
    {% else %}
    <img src="https://via.placeholder.com/140" alt="Shop Logo">
    {% endif %}

    <h2>{{ shop.sname }}</h2>

    <div class="info-box">
        <p><strong>Email:</strong> {{ shop.email }}</p>
        <p><strong>Phone:</strong> {{ shop.phone }}</p>
        <p><strong>Address:</strong> {{ shop.address }}</p>
        <p><strong>Password:</strong> {{ shop.password }}</p>
    </div>

    <a href="/shopeditprofile/"><button class="edit-btn">edit profile</button></a>
    <a href="{% url 'shopdeleteprofile' shop.id %} "><button class="edit-btn">Delete profile</button>
</div>

</body>
</html>
