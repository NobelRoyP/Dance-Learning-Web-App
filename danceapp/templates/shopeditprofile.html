<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Shop Profile</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: #f3f3f3;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .profile-card {
            width: 420px;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .profile-card h2 {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .profile-card img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #6fa8ff;
            display: block;
            margin: 0 auto 15px auto;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #6fa8ff;
            box-shadow: 0 0 5px rgba(111,168,255,0.4);
        }

        textarea {
            resize: none;
            height: 70px;
        }

        .btn-save {
            width: 100%;
            background: #6fa8ff;
            color: white;
            padding: 12px 0;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover {
            background: #3d8bff;
        }
    </style>

</head>
<body>

<div class="container">
    <div class="profile-card">

        <h2>Edit Shop Profile</h2>

        <!-- Current Logo -->
        {% if shop.shop_logo %}
        <img src="{{ shop.shop_logo.url }}" alt="Shop Logo">
        {% else %}
        <img src="https://via.placeholder.com/130" alt="Shop Logo">
        {% endif %}

        <!-- Edit Form -->
        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label>Shop Name</label>
            <input type="text" name="sname" value="{{ shop.sname }}" required>

            <label>Phone</label>
            <input type="text" name="phone" value="{{ shop.phone }}" required>

            <label>Address</label>
            <textarea name="address">{{ shop.address }}</textarea>

            <label>Shop Logo</label>
            <input type="file" name="shop_logo">

            <label>Password</label>
            <input type="text" name="password" value="{{ shop.password }}" required>

            <button type="submit" class="btn-save ">Save Changes</button>
        </form>

    </div>
</div>

</body>
</html>
